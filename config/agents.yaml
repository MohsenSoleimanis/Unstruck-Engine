# Agent Registry
# Each agent's config, capabilities, and constraints.
# Platform auto-loads these. Plugin agents register via plugins/{name}/agent.yaml.

agents:
  analyst:
    description: "Reasons over retrieved context to produce grounded answers with citations"
    version: "1.0.0"
    model_tier: worker
    allowed_tools: []
    trust_level: auto
    prompt: agents/analyst.md

  synthesizer:
    description: "Fuses outputs from multiple agents into a coherent final answer"
    version: "1.0.0"
    model_tier: worker
    allowed_tools: []
    trust_level: auto
    prompt: agents/synthesizer.md

  kg_reasoner:
    description: "Graph traversal + LLM reasoning for multi-hop questions across entities"
    version: "1.0.0"
    model_tier: worker
    allowed_tools:
      - rag_query
    trust_level: auto
    prompt: agents/kg_reasoner.md
